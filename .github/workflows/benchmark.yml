name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'packages/benchmark/**'
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  benchmark:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build ZTS (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Install benchmark dependencies
        run: bun install --cwd packages/benchmark

      - name: Run benchmark
        shell: bash
        run: |
          cd packages/benchmark
          bun run bench.ts 2>&1 | tee bench-output.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.os }}
          path: packages/benchmark/bench-output.txt

  update-pr:
    name: Update PR Body
    needs: benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Build benchmark section
        id: section
        shell: bash
        run: |
          {
            echo "section<<SECTIONEOF"
            echo ""
            echo "---"
            echo ""
            echo "## Benchmark Results (CI)"
            echo ""
            for dir in results/benchmark-*/; do
              os=$(basename "$dir" | sed 's/benchmark-//')
              echo "<details>"
              echo "<summary><b>${os}</b></summary>"
              echo ""
              echo '```'
              cat "${dir}bench-output.txt"
              echo '```'
              echo "</details>"
              echo ""
            done
            echo "> Auto-generated by CI on $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo "SECTIONEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const marker = '## Benchmark Results (CI)';
            const section = `${{ steps.section.outputs.section }}`;
            let body = pr.body || '';

            // 기존 벤치마크 섹션이 있으면 교체, 없으면 끝에 추가
            const markerIdx = body.indexOf(marker);
            if (markerIdx !== -1) {
              // --- 구분선부터 끝까지 교체
              const dividerIdx = body.lastIndexOf('---', markerIdx);
              body = body.substring(0, dividerIdx > 0 ? dividerIdx : markerIdx) + section;
            } else {
              body = body + '\n' + section;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: body,
            });
