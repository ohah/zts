name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Run benchmark
