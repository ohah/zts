name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Run Tests
        run: zig build test

      - name: Run Test262 Runner Tests
        run: zig build test262

      - name: Bundle Integration Test
        run: |
          mkdir -p /tmp/zts-ci-bundle
          echo 'import { x } from "./b"; console.log(x);' > /tmp/zts-ci-bundle/a.ts
          echo 'export const x: number = 42;' > /tmp/zts-ci-bundle/b.ts
          zig-out/bin/zts --bundle /tmp/zts-ci-bundle/a.ts -o /tmp/zts-ci-bundle/out.js
          cat /tmp/zts-ci-bundle/out.js
          grep -q "const x = 42;" /tmp/zts-ci-bundle/out.js

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Build (ReleaseSmall)
        run: zig build -Doptimize=ReleaseSmall

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check src/

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build WASM (ReleaseSmall)
        run: zig build -Dtarget=wasm32-freestanding -Doptimize=ReleaseSmall
        continue-on-error: true  # WASM 타겟은 추후 본격 지원 시 필수로 전환
