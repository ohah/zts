name: Integration & E2E

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'packages/**'

jobs:
  integration:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zts

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run fmt:check

      - name: Run integration tests
        run: bun run test:integration

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zts

      - name: Install Playwright browsers
        run: bun run playwright:install

      - name: Run E2E tests
        run: bun run test:e2e

  smoke:
    name: Smoke Tests (Real Projects)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zts

      - name: Debug node_modules
        run: |
          echo "=== Root node_modules ==="
          ls node_modules/lodash-es/package.json 2>&1 || echo "NOT FOUND at root"
          ls node_modules/.bin/esbuild 2>&1 || echo "esbuild NOT FOUND at root"
          echo "=== Benchmark node_modules ==="
          ls packages/benchmark/node_modules/.bin/esbuild 2>&1 || echo "esbuild NOT FOUND at benchmark"
          ls packages/benchmark/node_modules/lodash-es/package.json 2>&1 || echo "NOT FOUND at benchmark"
          echo "=== ZTS binary ==="
          ls -la zig-out/bin/zts 2>&1 || echo "ZTS NOT FOUND"
          echo "=== Quick test ==="
          echo 'import { groupBy } from "lodash-es"; console.log(typeof groupBy);' > _smoke_test.ts
          ./zig-out/bin/zts --bundle _smoke_test.ts --platform=node -o /tmp/smoke_test.js 2>&1 || true
          node /tmp/smoke_test.js 2>&1 || true
          rm -f _smoke_test.ts

      - name: Run smoke tests
        run: bun run packages/benchmark/smoke.ts 2>&1 | tee smoke-output.txt

      - name: Upload smoke results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke-output.txt

  smoke-comment:
    name: Post Smoke Results
    needs: smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Download smoke results
        uses: actions/download-artifact@v4
        with:
          name: smoke-results

      - name: Build comment body
        id: body
        shell: bash
        run: |
          BODY_FILE=$(mktemp)
          echo "## Smoke Test Results (CI)" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          grep -E '^(\||###|$)' smoke-output.txt >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          # 통과/실패 요약
          SUMMARY=$(tail -1 smoke-output.txt)
          echo "**${SUMMARY}**" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "> Auto-generated by CI on $(date -u +'%Y-%m-%d %H:%M UTC')" >> "$BODY_FILE"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        id: find
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Smoke Test Results (CI)'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.body.outputs.body_file }}
          edit-mode: replace
